name: Release Audit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Release Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Checkout 8Dionysus
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/8Dionysus
          ref: d80eac5e8ad2aa4cd1cf3546db030cafdaedda3d
          path: .deps/8Dionysus

      - name: Checkout aoa-agents
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-agents
          ref: c84916099b3200659b57a752a44f8e5972f948d8
          path: .deps/aoa-agents

      - name: Checkout aoa-playbooks
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: cb1b5b83a87621f7891a3fdc61265d2dde0fb7cf
          path: .deps/aoa-playbooks

      - name: Checkout aoa-memo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-memo
          ref: 06eb973bd5ee5d5bac1c3613d932d1e8940d8b0a
          path: .deps/aoa-memo

      - name: Checkout aoa-sdk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-sdk
          ref: 9a112a15541278c644e326cb5ae98a03657c3367
          path: .deps/aoa-sdk

      - name: Checkout aoa-evals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-evals
          ref: 991097f9e0d1c5dc8bcf4bb9864d29f7c515e2b4
          path: .deps/aoa-evals

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run release audit
        env:
          AOA_8DIONYSUS_ROOT: ./.deps/8Dionysus
          AOA_AGENTS_ROOT: ./.deps/aoa-agents
          AOA_PLAYBOOKS_ROOT: ./.deps/aoa-playbooks
          AOA_MEMO_ROOT: ./.deps/aoa-memo
          AOA_SDK_ROOT: ./.deps/aoa-sdk
          AOA_EVALS_ROOT: ./.deps/aoa-evals
        run: python scripts/release_check.py
