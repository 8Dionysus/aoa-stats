name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Repo Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check repo-local KAG index family
        uses: 8Dionysus/aoa-kag/.github/actions/repo-local-kag-index@da9f50a581645b2173b99dbf771a63d447ec2fec

      - name: Checkout 8Dionysus
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/8Dionysus
          ref: da16f337b09829d16a470cd5c8ba98dcba7b248c
          path: .deps/8Dionysus

      - name: Checkout aoa-agents
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-agents
          ref: 3ac8066e74fd7bc0a4235b3b8ee057de99b8fb19
          path: .deps/aoa-agents

      - name: Checkout aoa-playbooks
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: 5667de359e7aae2f9b409435cb8fcacaab2d37b1
          path: .deps/aoa-playbooks

      - name: Checkout aoa-memo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-memo
          ref: 5f87c4f2db09738eae8ba782a7dff26b4be76c62
          path: .deps/aoa-memo

      - name: Checkout aoa-sdk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-sdk
          ref: 51ac67d87ebb8a513720b19a97a18d39a7bc7ce7
          path: .deps/aoa-sdk

      - name: Checkout aoa-evals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-evals
          ref: f8e9a263f6890202a24da0ed4abf313e65e0d919
          path: .deps/aoa-evals

      - name: Checkout abyss-machine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/abyss-machine
          ref: ebd72a530c0b06c67140d6b38392a49e518f84ba
          path: .deps/abyss-machine

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run release audit
        env:
          AOA_8DIONYSUS_ROOT: ./.deps/8Dionysus
          AOA_AGENTS_ROOT: ./.deps/aoa-agents
          AOA_PLAYBOOKS_ROOT: ./.deps/aoa-playbooks
          AOA_MEMO_ROOT: ./.deps/aoa-memo
          AOA_SDK_ROOT: ./.deps/aoa-sdk
          AOA_EVALS_ROOT: ./.deps/aoa-evals
          ABYSS_MACHINE_REPO_ROOT: ./.deps/abyss-machine
        run: python scripts/release_check.py
