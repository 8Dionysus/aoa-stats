name: Release Audit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Release Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout 8Dionysus
        uses: actions/checkout@v4
        with:
          repository: 8Dionysus/8Dionysus
          ref: c0fd29bbf1250a5ac2a9d0bfd4f59cad46a9a490
          path: .deps/8Dionysus

      - name: Checkout aoa-sdk
        uses: actions/checkout@v4
        with:
          repository: 8Dionysus/aoa-sdk
          ref: 154b007338e1d1a65269532aa13c463214fa09d6
          path: .deps/aoa-sdk

      - name: Checkout aoa-evals
        uses: actions/checkout@v4
        with:
          repository: 8Dionysus/aoa-evals
          ref: be8475bc5095b8797f736cfc8a60ef3d2a9e9d79
          path: aoa-evals

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run release audit
        env:
          AOA_8DIONYSUS_ROOT: ./.deps/8Dionysus
          AOA_SDK_ROOT: ./.deps/aoa-sdk
          AOA_EVALS_ROOT: ./aoa-evals
        run: python scripts/release_check.py
