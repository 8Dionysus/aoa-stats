schema_version: aost_decision_index_contract_v1
authority: docs/decisions/AGENTS.md
source_records: docs/decisions/AOST-D-*.md
generated_by: scripts/generate_decision_indexes.py
path_mode: full_canonical_id_filename
pattern: AOST-D-####
generated_indexes:
  - docs/decisions/indexes/README.md
  - docs/decisions/indexes/by-number.md
  - docs/decisions/indexes/by-date.md
  - docs/decisions/indexes/by-surface.md
  - docs/decisions/indexes/by-stats-surface.md
  - docs/decisions/indexes/by-source-lane.md
  - docs/decisions/indexes/by-guard.md
required_metadata:
  - Decision ID
  - Original date
  - Surface classes
  - Stats surfaces
  - Source lanes
  - Guard families
  - Posture
notes:
  - Decision notes own rationale.
  - Generated indexes are read models only.
  - Source repositories own meaning; aoa-stats owns derived observability.
